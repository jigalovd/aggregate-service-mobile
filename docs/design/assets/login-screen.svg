<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px; font-weight: 600; fill: #1C1B1F; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #49454F; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #49454F; }
      .input-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #6750A4; }
      .input-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; fill: #1C1B1F; }
      .btn-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 500; }
      .link { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #6750A4; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Phone Frame -->
  <rect x="0" y="0" width="400" height="800" rx="40" fill="#1C1B1F"/>
  <rect x="8" y="8" width="384" height="784" rx="36" fill="#FFFBFE"/>

  <!-- Status Bar -->
  <rect x="8" y="8" width="384" height="32" rx="36" fill="#FFFBFE"/>
  <text x="180" y="28" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #1C1B1F;">9:41</text>
  <text x="320" y="28" style="font-size: 12px;">📶 🔋</text>

  <!-- Content Area -->
  <rect x="8" y="40" width="384" height="720" fill="#FFFBFE"/>

  <!-- Logo / Brand -->
  <circle cx="200" cy="120" r="48" fill="#6750A4" filter="url(#shadow)"/>
  <text x="188" y="130" style="font-size: 32px; fill: #FFFFFF;">✂️</text>

  <text x="200" y="195" text-anchor="middle" class="title">Aggregate Service</text>
  <text x="200" y="220" text-anchor="middle" class="subtitle">Find your perfect beauty master</text>

  <!-- Email Field -->
  <rect x="32" y="280" width="336" height="56" rx="4" fill="#FFFFFF" stroke="#6750A4" stroke-width="2"/>
  <text x="48" y="300" class="input-label">Email</text>
  <text x="48" y="320" class="input-text">user@example.com</text>

  <!-- Password Field -->
  <rect x="32" y="352" width="336" height="56" rx="4" fill="#FFFFFF" stroke="#79747E" stroke-width="1"/>
  <text x="48" y="372" class="label">Password</text>
  <text x="48" y="392" class="input-text">••••••••</text>
  <text x="340" y="385" style="font-size: 16px; fill: #79747E;">👁️</text>

  <!-- Forgot Password -->
  <text x="320" y="430" text-anchor="end" class="link">Forgot password?</text>

  <!-- Login Button -->
  <rect x="32" y="460" width="336" height="48" rx="24" fill="#6750A4" filter="url(#shadow)"/>
  <text x="175" y="490" class="btn-text" fill="#FFFFFF">Login</text>

  <!-- Divider -->
  <line x1="80" y1="540" x2="180" y2="540" stroke="#E7E0EC" stroke-width="1"/>
  <text x="200" y="545" text-anchor="middle" class="label">or</text>
  <line x1="220" y1="540" x2="320" y2="540" stroke="#E7E0EC" stroke-width="1"/>

  <!-- Social Login -->
  <rect x="80" y="570" width="56" height="48" rx="8" fill="#FFFFFF" stroke="#E7E0EC" stroke-width="1"/>
  <text x="100" y="600" text-anchor="middle" style="font-size: 20px;">G</text>

  <rect x="172" y="570" width="56" height="48" rx="8" fill="#FFFFFF" stroke="#E7E0EC" stroke-width="1"/>
  <text x="192" y="600" text-anchor="middle" style="font-size: 20px;">🍎</text>

  <rect x="264" y="570" width="56" height="48" rx="8" fill="#FFFFFF" stroke="#E7E0EC" stroke-width="1"/>
  <text x="284" y="600" text-anchor="middle" style="font-size: 20px;">📘</text>

  <!-- Sign Up Link -->
  <text x="200" y="680" text-anchor="middle" class="label">Don't have an account?</text>
  <text x="200" y="710" text-anchor="middle" class="link">Sign up</text>

  <!-- Language Selector -->
  <rect x="140" y="740" width="120" height="32" rx="16" fill="#EADDFF"/>
  <text x="200" y="761" text-anchor="middle" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #21005D;">🌐 English ▼</text>

  <!-- Home Indicator -->
  <rect x="160" y="780" width="80" height="4" rx="2" fill="#1C1B1F"/>
</svg>
