<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" width="900" height="800">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px; font-weight: 600; fill: #1C1B1F; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #49454F; }
      .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #6750A4; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #49454F; }
      .btn-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 500; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="800" fill="#FFFBFE"/>

  <!-- Title -->
  <text x="40" y="45" class="title">Aggregate Service — UI Components</text>
  <text x="40" y="65" class="subtitle">Material 3 Design System</text>

  <!-- Buttons Section -->
  <text x="40" y="110" class="section-title">Buttons</text>

  <!-- Primary Button -->
  <rect x="40" y="125" width="180" height="48" rx="24" fill="#6750A4" filter="url(#shadow)"/>
  <text x="85" y="155" class="btn-text" fill="#FFFFFF">Primary Button</text>

  <!-- Primary Button Disabled -->
  <rect x="240" y="125" width="180" height="48" rx="24" fill="#E7E0EC"/>
  <text x="275" y="155" class="btn-text" fill="#79747E">Disabled Button</text>

  <!-- Secondary Button -->
  <rect x="440" y="125" width="180" height="48" rx="24" fill="#FFFFFF" stroke="#79747E" stroke-width="1.5"/>
  <text x="485" y="155" class="btn-text" fill="#6750A4">Secondary Button</text>

  <!-- Text Button -->
  <text x="660" y="155" class="btn-text" fill="#6750A4">Text Button →</text>

  <!-- Loading Button -->
  <rect x="40" y="190" width="180" height="48" rx="24" fill="#6750A4"/>
  <circle cx="130" cy="214" r="10" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="20 10"/>
  <text x="150" y="220" class="btn-text" fill="#FFFFFF">Loading...</text>

  <!-- Icon Button -->
  <rect x="240" y="190" width="48" height="48" rx="24" fill="#EADDFF"/>
  <text x="256" y="220" style="font-size: 20px;">+</text>

  <!-- FAB -->
  <rect x="310" y="190" width="56" height="56" rx="28" fill="#6750A4" filter="url(#shadow)"/>
  <text x="329" y="225" style="font-size: 24px; fill: #FFFFFF;">+</text>

  <!-- Text Fields Section -->
  <text x="40" y="290" class="section-title">Text Fields</text>

  <!-- Default Text Field -->
  <rect x="40" y="305" width="300" height="56" rx="4" fill="#FFFFFF" stroke="#79747E" stroke-width="1"/>
  <text x="56" y="325" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #49454F;">Label</text>
  <text x="56" y="345" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; fill: #1C1B1F;">Input text</text>

  <!-- Focused Text Field -->
  <rect x="360" y="305" width="300" height="56" rx="4" fill="#FFFFFF" stroke="#6750A4" stroke-width="2"/>
  <text x="376" y="325" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #6750A4;">Label</text>
  <text x="376" y="345" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; fill: #1C1B1F;">Input text</text>

  <!-- Error Text Field -->
  <rect x="40" y="380" width="300" height="56" rx="4" fill="#FFFFFF" stroke="#B3261E" stroke-width="2"/>
  <text x="56" y="400" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #B3261E;">Label</text>
  <text x="56" y="420" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; fill: #1C1B1F;">Invalid input</text>
  <text x="56" y="450" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #B3261E;">Error message</text>

  <!-- Cards Section -->
  <text x="40" y="490" class="section-title">Cards</text>

  <!-- Elevated Card -->
  <rect x="40" y="505" width="260" height="140" rx="12" fill="#E7E0EC" filter="url(#shadow)"/>
  <text x="60" y="540" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 500; fill: #1C1B1F;">Elevated Card</text>
  <text x="60" y="565" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #49454F;">Secondary text description</text>
  <rect x="60" y="585" width="80" height="32" rx="16" fill="#6750A4"/>
  <text x="75" y="606" class="btn-text" fill="#FFFFFF">Action</text>

  <!-- Outlined Card -->
  <rect x="320" y="505" width="260" height="140" rx="12" fill="#FFFBFE" stroke="#CAC4D0" stroke-width="1"/>
  <text x="340" y="540" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 500; fill: #1C1B1F;">Outlined Card</text>
  <text x="340" y="565" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #49454F;">Secondary text description</text>
  <rect x="340" y="585" width="80" height="32" rx="16" fill="#FFFFFF" stroke="#6750A4" stroke-width="1.5"/>
  <text x="358" y="606" class="btn-text" fill="#6750A4">Action</text>

  <!-- Chips Section -->
  <text x="40" y="680" class="section-title">Chips</text>

  <!-- Filter Chips -->
  <rect x="40" y="695" width="90" height="32" rx="16" fill="#EADDFF"/>
  <text x="58" y="716" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #21005D;">Selected</text>

  <rect x="145" y="695" width="90" height="32" rx="16" fill="#FFFFFF" stroke="#79747E" stroke-width="1"/>
  <text x="168" y="716" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #1C1B1F;">Default</text>

  <!-- Suggestion Chips -->
  <rect x="250" y="695" width="110" height="32" rx="8" fill="#E8DEF8"/>
  <text x="265" y="716" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #1D192B;">Suggestion</text>

  <!-- Assist Chips -->
  <rect x="375" y="695" width="100" height="32" rx="8" fill="#FFFFFF" stroke="#CAC4D0" stroke-width="1"/>
  <text x="393" y="716" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #49454F;">Assist</text>

  <!-- Badges Section -->
  <text x="40" y="760" class="section-title">Badges &amp; Indicators</text>

  <!-- Badge -->
  <circle cx="60" cy="785" r="12" fill="#B3261E"/>
  <text x="56" y="790" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: 500; fill: #FFFFFF;">3</text>

  <!-- Status Indicators -->
  <circle cx="120" cy="785" r="8" fill="#4CAF50"/>
  <text x="135" y="790" class="label">Success</text>

  <circle cx="210" cy="785" r="8" fill="#FF9800"/>
  <text x="225" y="790" class="label">Warning</text>

  <circle cx="300" cy="785" r="8" fill="#B3261E"/>
  <text x="315" y="790" class="label">Error</text>

  <circle cx="390" cy="785" r="8" fill="#2196F3"/>
  <text x="405" y="790" class="label">Info</text>

  <!-- Progress -->
  <rect x="500" y="780" width="120" height="4" rx="2" fill="#E7E0EC"/>
  <rect x="500" y="780" width="80" height="4" rx="2" fill="#6750A4"/>

  <!-- Navigation Preview (Right Side) -->
  <text x="680" y="110" class="section-title">Bottom Navigation</text>

  <rect x="680" y="125" width="180" height="80" rx="0" fill="#FFFBFE" stroke="#E7E0EC" stroke-width="1"/>
  <rect x="680" y="185" width="180" height="20" fill="#EADDFF"/>

  <!-- Nav items -->
  <circle cx="720" cy="160" r="12" fill="#6750A4"/>
  <text x="712" y="165" style="font-size: 14px; fill: #FFFFFF;">🏠</text>
  <text x="708" y="180" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #6750A4;">Home</text>

  <circle cx="770" cy="160" r="12" fill="transparent"/>
  <text x="762" y="165" style="font-size: 14px; fill: #79747E;">🔍</text>
  <text x="758" y="180" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #79747E;">Search</text>

  <circle cx="820" cy="160" r="12" fill="transparent"/>
  <text x="812" y="165" style="font-size: 14px; fill: #79747E;">📅</text>
  <text x="810" y="180" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #79747E;">Book</text>

  <!-- Top App Bar Preview -->
  <text x="680" y="240" class="section-title">Top App Bar</text>

  <rect x="680" y="255" width="180" height="56" rx="0" fill="#FFFBFE" stroke="#E7E0EC" stroke-width="1"/>
  <text x="700" y="288" style="font-size: 16px; fill: #1C1B1F;">←</text>
  <text x="730" y="290" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 500; fill: #1C1B1F;">Screen Title</text>
</svg>
