<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px; font-weight: 600; fill: #1C1B1F; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #49454F; }
      .color-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #1C1B1F; }
      .color-hex { font-family: 'Consolas', monospace; font-size: 10px; fill: #49454F; }
      .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #6750A4; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FFFBFE"/>

  <!-- Title -->
  <text x="40" y="45" class="title">Aggregate Service — Color Palette</text>
  <text x="40" y="65" class="subtitle">Material 3 Design System</text>

  <!-- Primary Colors Section -->
  <text x="40" y="110" class="section-title">Primary Colors</text>

  <!-- Primary -->
  <rect x="40" y="120" width="120" height="80" rx="8" fill="#6750A4"/>
  <text x="50" y="145" class="color-label" fill="#FFFFFF">Primary</text>
  <text x="50" y="160" class="color-hex" fill="#EADDFF">#6750A4</text>

  <!-- Primary Container -->
  <rect x="170" y="120" width="120" height="80" rx="8" fill="#EADDFF" stroke="#CAC4D0" stroke-width="1"/>
  <text x="180" y="145" class="color-label">Primary Container</text>
  <text x="180" y="160" class="color-hex">#EADDFF</text>

  <!-- On Primary -->
  <rect x="300" y="120" width="120" height="80" rx="8" fill="#FFFFFF" stroke="#CAC4D0" stroke-width="1"/>
  <text x="310" y="145" class="color-label">On Primary</text>
  <text x="310" y="160" class="color-hex">#FFFFFF</text>

  <!-- On Primary Container -->
  <rect x="430" y="120" width="120" height="80" rx="8" fill="#21005D"/>
  <text x="440" y="145" class="color-label" fill="#FFFFFF">On Primary Container</text>
  <text x="440" y="160" class="color-hex" fill="#EADDFF">#21005D</text>

  <!-- Secondary Colors Section -->
  <text x="40" y="230" class="section-title">Secondary Colors</text>

  <!-- Secondary -->
  <rect x="40" y="240" width="120" height="80" rx="8" fill="#625B71"/>
  <text x="50" y="265" class="color-label" fill="#FFFFFF">Secondary</text>
  <text x="50" y="280" class="color-hex" fill="#E8DEF8">#625B71</text>

  <!-- Secondary Container -->
  <rect x="170" y="240" width="120" height="80" rx="8" fill="#E8DEF8" stroke="#CAC4D0" stroke-width="1"/>
  <text x="180" y="265" class="color-label">Secondary Container</text>
  <text x="180" y="280" class="color-hex">#E8DEF8</text>

  <!-- On Secondary -->
  <rect x="300" y="240" width="120" height="80" rx="8" fill="#FFFFFF" stroke="#CAC4D0" stroke-width="1"/>
  <text x="310" y="265" class="color-label">On Secondary</text>
  <text x="310" y="280" class="color-hex">#FFFFFF</text>

  <!-- On Secondary Container -->
  <rect x="430" y="240" width="120" height="80" rx="8" fill="#1D192B"/>
  <text x="440" y="265" class="color-label" fill="#FFFFFF">On Secondary Container</text>
  <text x="440" y="280" class="color-hex" fill="#E8DEF8">#1D192B</text>

  <!-- Semantic Colors Section -->
  <text x="40" y="350" class="section-title">Semantic Colors</text>

  <!-- Success -->
  <rect x="40" y="360" width="100" height="70" rx="8" fill="#4CAF50"/>
  <text x="50" y="385" class="color-label" fill="#FFFFFF">Success</text>
  <text x="50" y="400" class="color-hex" fill="#FFFFFF">#4CAF50</text>

  <!-- Warning -->
  <rect x="150" y="360" width="100" height="70" rx="8" fill="#FF9800"/>
  <text x="160" y="385" class="color-label" fill="#FFFFFF">Warning</text>
  <text x="160" y="400" class="color-hex" fill="#FFFFFF">#FF9800</text>

  <!-- Error -->
  <rect x="260" y="360" width="100" height="70" rx="8" fill="#B3261E"/>
  <text x="270" y="385" class="color-label" fill="#FFFFFF">Error</text>
  <text x="270" y="400" class="color-hex" fill="#FFFFFF">#B3261E</text>

  <!-- Info -->
  <rect x="370" y="360" width="100" height="70" rx="8" fill="#2196F3"/>
  <text x="380" y="385" class="color-label" fill="#FFFFFF">Info</text>
  <text x="380" y="400" class="color-hex" fill="#FFFFFF">#2196F3</text>

  <!-- Neutral Colors Section -->
  <text x="40" y="470" class="section-title">Neutral Colors</text>

  <!-- Surface -->
  <rect x="40" y="480" width="80" height="50" rx="8" fill="#FFFBFE" stroke="#CAC4D0" stroke-width="1"/>
  <text x="50" y="500" class="color-label">Surface</text>
  <text x="50" y="515" class="color-hex">#FFFBFE</text>

  <!-- Surface Variant -->
  <rect x="130" y="480" width="80" height="50" rx="8" fill="#E7E0EC" stroke="#CAC4D0" stroke-width="1"/>
  <text x="140" y="500" class="color-label">Surface Var</text>
  <text x="140" y="515" class="color-hex">#E7E0EC</text>

  <!-- Outline -->
  <rect x="220" y="480" width="80" height="50" rx="8" fill="#79747E"/>
  <text x="230" y="500" class="color-label" fill="#FFFFFF">Outline</text>
  <text x="230" y="515" class="color-hex" fill="#FFFFFF">#79747E</text>

  <!-- Outline Variant -->
  <rect x="310" y="480" width="80" height="50" rx="8" fill="#CAC4D0"/>
  <text x="320" y="500" class="color-label">Outline Var</text>
  <text x="320" y="515" class="color-hex">#CAC4D0</text>

  <!-- On Surface -->
  <rect x="400" y="480" width="80" height="50" rx="8" fill="#1C1B1F"/>
  <text x="410" y="500" class="color-label" fill="#FFFFFF">On Surface</text>
  <text x="410" y="515" class="color-hex" fill="#FFFFFF">#1C1B1F</text>

  <!-- On Surface Variant -->
  <rect x="490" y="480" width="80" height="50" rx="8" fill="#49454F"/>
  <text x="500" y="500" class="color-label" fill="#FFFFFF">On Surface Var</text>
  <text x="500" y="515" class="color-hex" fill="#FFFFFF">#49454F</text>

  <!-- Dark Mode Preview -->
  <text x="600" y="110" class="section-title">Dark Mode</text>

  <rect x="600" y="120" width="160" height="200" rx="12" fill="#1C1B1F"/>
  <text x="620" y="145" class="color-label" fill="#FFFFFF">Dark Surface</text>
  <text x="620" y="160" class="color-hex" fill="#938F99">#1C1B1F</text>

  <rect x="620" y="175" width="120" height="35" rx="8" fill="#D0BCFF"/>
  <text x="630" y="195" class="color-label" fill="#21005D">Primary Dark</text>
  <text x="630" y="207" class="color-hex" fill="#21005D">#D0BCFF</text>

  <rect x="620" y="220" width="120" height="35" rx="8" fill="#381E72"/>
  <text x="630" y="240" class="color-label" fill="#D0BCFF">Primary Container</text>
  <text x="630" y="252" class="color-hex" fill="#D0BCFF">#381E72</text>

  <rect x="620" y="265" width="120" height="35" rx="8" fill="#F2B8B5"/>
  <text x="630" y="285" class="color-label" fill="#21005D">Error Dark</text>
  <text x="630" y="297" class="color-hex" fill="#21005D">#F2B8B5</text>

  <!-- Footer -->
  <line x1="40" y1="560" x2="760" y2="560" stroke="#E7E0EC" stroke-width="1"/>
  <text x="40" y="580" class="subtitle">Aggregate Service Design System v1.0 • Material 3</text>
</svg>
