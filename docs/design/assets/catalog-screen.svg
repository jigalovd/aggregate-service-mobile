<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 500; fill: #1C1B1F; }
      .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #49454F; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #49454F; }
      .card-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 500; fill: #1C1B1F; }
      .card-subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #49454F; }
      .rating { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #1C1B1F; }
      .price { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #6750A4; }
    </style>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Phone Frame -->
  <rect x="0" y="0" width="400" height="800" rx="40" fill="#1C1B1F"/>
  <rect x="8" y="8" width="384" height="784" rx="36" fill="#FFFBFE"/>

  <!-- Status Bar -->
  <rect x="8" y="8" width="384" height="32" fill="#FFFBFE"/>
  <text x="180" y="28" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #1C1B1F;">9:41</text>
  <text x="320" y="28" style="font-size: 12px;">📶 🔋</text>

  <!-- Top App Bar -->
  <rect x="8" y="40" width="384" height="56" fill="#FFFBFE"/>
  <text x="32" y="75" class="title">Find Masters</text>

  <!-- Search Bar -->
  <rect x="24" y="104" width="352" height="48" rx="24" fill="#E7E0EC"/>
  <text x="56" y="133" class="subtitle">🔍 Search for services, masters...</text>

  <!-- Category Chips -->
  <rect x="24" y="168" width="80" height="32" rx="16" fill="#6750A4"/>
  <text x="42" y="189" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #FFFFFF;">All</text>

  <rect x="112" y="168" width="90" height="32" rx="16" fill="#FFFFFF" stroke="#79747E" stroke-width="1"/>
  <text x="127" y="189" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #1C1B1F;">✂️ Hair</text>

  <rect x="210" y="168" width="90" height="32" rx="16" fill="#FFFFFF" stroke="#79747E" stroke-width="1"/>
  <text x="223" y="189" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #1C1B1F;">💅 Nails</text>

  <rect x="308" y="168" width="70" height="32" rx="16" fill="#FFFFFF" stroke="#79747E" stroke-width="1"/>
  <text x="322" y="189" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #1C1B1F;">💆 Spa</text>

  <!-- Provider Card 1 -->
  <rect x="24" y="216" width="352" height="140" rx="12" fill="#FFFFFF" filter="url(#card-shadow)"/>

  <!-- Avatar -->
  <circle cx="72" cy="266" r="36" fill="#EADDFF"/>
  <text x="62" y="275" style="font-size: 28px; fill: #6750A4;">👩</text>

  <!-- Info -->
  <text x="120" y="248" class="card-title">Sarah's Beauty Studio</text>
  <text x="120" y="268" class="card-subtitle">Hair styling • Coloring • Extensions</text>

  <!-- Rating -->
  <rect x="120" y="280" width="60" height="20" rx="10" fill="#EADDFF"/>
  <text x="128" y="294" style="font-size: 12px; fill: #21005D;">⭐ 4.9</text>

  <!-- Distance -->
  <text x="190" y="294" class="card-subtitle">📍 1.2 km</text>

  <!-- Price -->
  <text x="320" y="294" class="price">from $50</text>

  <!-- Tags -->
  <rect x="120" y="312" width="70" height="24" rx="12" fill="#E8DEF8"/>
  <text x="127" y="328" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #1D192B;">✓ Verified</text>

  <rect x="198" y="312" width="80" height="24" rx="12" fill="#E7E0EC"/>
  <text x="206" y="328" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #49454F;">🕐 9:00 - 19:00</text>

  <!-- Provider Card 2 -->
  <rect x="24" y="368" width="352" height="140" rx="12" fill="#FFFFFF" filter="url(#card-shadow)"/>

  <!-- Avatar -->
  <circle cx="72" cy="418" r="36" fill="#E8DEF8"/>
  <text x="62" y="427" style="font-size: 28px; fill: #625B71;">👨</text>

  <!-- Info -->
  <text x="120" y="400" class="card-title">Alex Barber Shop</text>
  <text x="120" y="420" class="card-subtitle">Men's cuts • Beard • Shaving</text>

  <!-- Rating -->
  <rect x="120" y="432" width="60" height="20" rx="10" fill="#EADDFF"/>
  <text x="128" y="446" style="font-size: 12px; fill: #21005D;">⭐ 4.8</text>

  <!-- Distance -->
  <text x="190" y="446" class="card-subtitle">📍 2.5 km</text>

  <!-- Price -->
  <text x="320" y="446" class="price">from $25</text>

  <!-- Tags -->
  <rect x="120" y="464" width="70" height="24" rx="12" fill="#E8DEF8"/>
  <text x="127" y="480" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #1D192B;">✓ Verified</text>

  <rect x="198" y="464" width="80" height="24" rx="12" fill="#E7E0EC"/>
  <text x="206" y="480" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #49454F;">🕐 10:00 - 20:00</text>

  <!-- Provider Card 3 -->
  <rect x="24" y="520" width="352" height="140" rx="12" fill="#FFFFFF" filter="url(#card-shadow)"/>

  <!-- Avatar -->
  <circle cx="72" cy="570" r="36" fill="#CAC4D0"/>
  <text x="62" y="579" style="font-size: 28px; fill: #49454F;">👩</text>

  <!-- Info -->
  <text x="120" y="552" class="card-title">Nail Art Studio</text>
  <text x="120" y="572" class="card-subtitle">Manicure • Pedicure • Nail art</text>

  <!-- Rating -->
  <rect x="120" y="584" width="60" height="20" rx="10" fill="#EADDFF"/>
  <text x="128" y="598" style="font-size: 12px; fill: #21005D;">⭐ 4.7</text>

  <!-- Distance -->
  <text x="190" y="598" class="card-subtitle">📍 0.8 km</text>

  <!-- Price -->
  <text x="320" y="598" class="price">from $35</text>

  <!-- Tags -->
  <rect x="120" y="616" width="80" height="24" rx="12" fill="#E7E0EC"/>
  <text x="127" y="632" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #49454F;">🕐 9:00 - 21:00</text>

  <!-- Bottom Navigation -->
  <rect x="8" y="712" width="384" height="80" fill="#FFFBFE" stroke="#E7E0EC" stroke-width="1"/>

  <!-- Nav Items -->
  <rect x="24" y="720" width="72" height="56" rx="16" fill="#EADDFF"/>
  <text x="50" y="745" style="font-size: 20px; text-anchor: middle;">🏠</text>
  <text x="60" y="768" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #6750A4; text-anchor: middle;">Home</text>

  <text x="140" y="745" style="font-size: 20px; text-anchor: middle;">🔍</text>
  <text x="140" y="768" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #79747E; text-anchor: middle;">Search</text>

  <text x="220" y="745" style="font-size: 20px; text-anchor: middle;">📅</text>
  <text x="220" y="768" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #79747E; text-anchor: middle;">Bookings</text>

  <text x="300" y="745" style="font-size: 20px; text-anchor: middle;">❤️</text>
  <text x="300" y="768" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #79747E; text-anchor: middle;">Favorites</text>

  <text x="380" y="745" style="font-size: 20px; text-anchor: middle;">👤</text>
  <text x="380" y="768" style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #79747E; text-anchor: middle;">Profile</text>

  <!-- FAB -->
  <circle cx="360" cy="696" r="28" fill="#6750A4" filter="url(#card-shadow)"/>
  <text x="352" y="704" style="font-size: 24px; fill: #FFFFFF;">🗺️</text>

  <!-- Home Indicator -->
  <rect x="160" y="780" width="80" height="4" rx="2" fill="#1C1B1F"/>
</svg>
